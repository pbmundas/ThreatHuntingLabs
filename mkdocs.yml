site_name: Threat Hunting Labs
site_url: https://threathuntlabs.com

theme:
  name: material

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - blog

nav:
  - Home: index.md

  - Foundations:
      - 10 Common Mistakes: foundations/10-Common-Mistakes-Every-Beginner-Makes-When-Learning-Threat-Hunting.md
      - Cybersecurity Fundamentals: foundations/Cybersecurity-Fundamentals-The-Foundation-Every-Threat-Hunter-Needs-part-1.md
      - Why and Where Threat Hunting: foundations/Why-Every-Organization-Needs-Threat-Hunting.md
      - Threat Hunting Explained: foundations/Threat-Hunting-Explained-Beyond-Alerts-Dashboards-and-SIEM-Queries.md
      - Threat Hunting Data Pipeline: foundations/Threat-Hunting-Data-Pipeline.md
      - Threat Hunting Life Cycle: foundations/Inside-a-Threat-Hunt-Understanding-the-Threat-Hunting-Lifecycle.md
      - Threat Hunting Types: foundations/Types-of-Threat-Hunting-Choosing-the-Right-Hunting-Strategy.md
      - Data Analysis Techniques: foundations/Threat-Hunting-Data-Analysis-Techniques.md
      - Hypothesis Development: foundations/Hypothesis-Development-Thinking-Like-a-Threat-Hunter-Before-Writing-a-Single-Query.md
      - Methodologies: foundations/Threat-Hunting-Methodologies:-Choosing-the-Right-Hunting-Approach.md

  #- MITRE ATT&CK:
  #    - Introduction: mitre/introduction.md

  #- Windows Hunting:
  #   - PowerShell Hunting: windows/powershell-hunting.md

  - Learn Cyber Attacks:
      - Attacks: learn-known-cyber-attacks/index.html
