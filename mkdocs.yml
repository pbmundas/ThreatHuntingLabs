site_name: "Threat Hunt Labs"
site_url: "https://threathuntlabs.com"
site_description: "An independent repository for live cyber threat Hunting, intelligence, playbooks, and raw telemetry."
site_author: "Threathuntlabs Team"

# Ensure clean URLs (removes .html from links for better SEO)
use_directory_urls: true


theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - assets/stylesheets/threat-hunt.css

extra_javascript:
  - assets/javascripts/navigation-tabs.js

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

